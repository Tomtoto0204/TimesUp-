<div class="min-h-screen bg-gray-100 p-6 flex flex-col items-center justify-center font-sans text-gray-800">

  <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-6 flex flex-col items-center text-center relative overflow-hidden">

    <!-- Háttér zöld sáv -->
    <div class="absolute top-0 left-0 w-full h-32 bg-gradient-to-br from-green-400 to-emerald-600"></div>

    <!-- Szerkesztés gomb (Ceruza ikon, jobb felső sarokba fixálva) -->
    <button (click) = 'edit()'
            class="absolute top-4 right-4 z-20 flex items-center justify-center bg-white/20 text-white p-2.5 rounded-full hover:bg-white/30 backdrop-blur-sm transition-colors shadow-sm active:scale-95">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
      </svg>
    </button>

    <!-- "Kör Vége!" felirat (relative z-10 biztosítja, hogy a zöld sáv felett legyen) -->
    <h2 class="relative z-10 text-white font-black text-3xl mt-4 mb-10 tracking-widest uppercase drop-shadow-md">Kör Vége!</h2>

    <!-- Pontszámító kártya (relative z-10) -->
    <div class="relative z-10 bg-white rounded-2xl shadow-lg w-full p-6 mb-8 transform -translate-y-2 border border-gray-100">
      <h3 class="text-xl font-extrabold text-gray-800 mb-6">{{ teamName }}</h3>

      <div class="flex justify-around items-center">
        <div class="flex flex-col items-center">
          <span class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-1">Ebben a körben</span>
          <span class="text-5xl font-black text-green-500">+{{ roundPoints }}</span>
        </div>

        <div class="w-px h-16 bg-gray-200"></div>

        <div class="flex flex-col items-center">
          <span class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-1">Összesen</span>
          <span class="text-5xl font-black text-indigo-600">{{ newTotal }}</span>
        </div>
      </div>
    </div>

    <button (click)="nextTurn()"
            class="w-full relative z-10 bg-indigo-600 text-white font-black text-xl py-6 rounded-2xl shadow-[0_6px_0_rgb(67,56,202)] hover:bg-indigo-500 active:shadow-[0_0px_0_rgb(67,56,202)] active:translate-y-1 transition-all">
      JÖHET A KÖVETKEZŐ!
    </button>

  </div>

</div>
