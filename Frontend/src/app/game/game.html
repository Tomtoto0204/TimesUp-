<div class="min-h-screen bg-gray-100 p-6 font-sans text-gray-800 flex flex-col items-center justify-center">

  <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 flex flex-col items-center text-center">

    <div class="mb-10 w-full">

      <div class="relative flex justify-center items-center w-full mb-3">

        <span class="inline-block bg-indigo-100 text-indigo-800 text-sm font-black px-4 py-1 rounded-full uppercase tracking-widest">
          {{ currentPhase }}. Fázis
        </span>

        <span class="absolute right-0 inline-block bg-slate-100 text-slate-600 text-xs font-bold px-3 py-1 rounded-full border border-slate-200 shadow-sm">
          ⏳ {{ remainingWordsCount }} szó
        </span>

      </div>

      <h1 class="text-3xl font-extrabold text-gray-900 mb-2">{{ phaseTitle }}</h1>
      <p class="text-gray-500 text-sm leading-relaxed">
        {{ phaseDescription }}
      </p>
    </div>

    <div class="w-full bg-gradient-to-br from-indigo-50 to-purple-50 border border-indigo-100 rounded-2xl p-6 mb-12 shadow-sm">
      <p class="text-xs font-bold text-indigo-400 uppercase tracking-widest mb-1">Következik</p>
      <h2 class="text-4xl font-black text-indigo-900 mb-1">{{ currentPlayer }}</h2>
      <p class="text-indigo-600 font-semibold">{{ currentTeam }}</p>
    </div>

    <button (click)="startTimer()"
            class="w-full bg-green-500 text-white font-black text-2xl py-6 rounded-2xl shadow-[0_8px_0_rgb(22,163,74)] hover:bg-green-400 active:shadow-[0_0px_0_rgb(22,163,74)] active:translate-y-2 transition-all">
      IDŐ INDÍTÁSA
    </button>

  </div>

</div>
