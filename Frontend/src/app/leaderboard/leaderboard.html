<div class="min-h-screen bg-gray-100 p-4 md:p-6 flex flex-col items-center justify-center py-12 font-sans text-gray-800">

  <div class="w-full max-w-2xl bg-white rounded-3xl shadow-2xl overflow-hidden relative">

    <div class="bg-indigo-600 p-8 text-center">
      <h1 class="text-4xl font-black text-white uppercase tracking-widest">Végeredmény</h1>
      <p class="text-indigo-200 mt-2 font-medium">Itt a vége, fuss el véle!</p>
    </div>

    <div class="p-2 md:p-6">
      <table class="w-full text-left border-collapse">
        <thead>
        <tr class="bg-gray-50 text-gray-500 uppercase text-xs md:text-sm tracking-wider border-b-2 border-gray-200">
          <th class="p-3 md:p-4 font-bold text-center w-12 md:w-16">#</th>
          <th class="p-3 md:p-4 font-bold">Csapat</th>
          <th class="p-3 md:p-4 font-bold text-right w-20 md:w-24">Pont</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let team of sortedTeams; let i = index"
            class="border-b border-gray-100 hover:bg-gray-50 transition-colors"
            [ngClass]="{'bg-yellow-50': i === 0}">

          <td class="p-3 md:p-4 text-center font-black"
              [ngClass]="i === 0 ? 'text-yellow-500 text-2xl' : 'text-gray-400 text-lg'">
            <span *ngIf="i === 0">🏆</span>
            <span *ngIf="i !== 0">{{ i + 1 }}.</span>
          </td>

          <td class="p-3 md:p-4">
            <div class="font-bold text-lg text-gray-800">{{ team.teamId }}. Csapat</div>
            <div class="text-xs md:text-sm text-gray-500 mt-1">{{ team.players.join(', ') }}</div>
          </td>

          <td class="p-3 md:p-4 text-right font-black text-2xl md:text-3xl"
              [ngClass]="i === 0 ? 'text-yellow-600' : 'text-indigo-600'">
            {{ team.teamScore }}
          </td>

        </tr>
        </tbody>
      </table>
    </div>

    <div class="p-6 bg-gray-50 border-t border-gray-100 mt-4">
      <button (click)="startNewGame()"
              class="w-full bg-indigo-600 text-white font-black text-xl py-5 rounded-2xl shadow-[0_6px_0_rgb(67,56,202)] hover:bg-indigo-500 active:shadow-[0_0px_0_rgb(67,56,202)] active:translate-y-1 transition-all">
        ÚJ JÁTÉK LÉTREHOZÁSA
      </button>
    </div>

  </div>

</div>
